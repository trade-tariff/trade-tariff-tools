name: Close stale pull requests (reusable)

on:
  workflow_call:
    inputs:
      stale_days:
        description: Close pull requests with no activity for at least this many days
        required: false
        type: number
        default: 14
      keep_label:
        description: Label that exempts a pull request from automatic closure
        required: false
        type: string
        default: keep
      dry_run:
        description: List pull requests that would be closed without closing them
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  close-stale:
    runs-on: ubuntu-latest
    steps:
      - name: Close stale pull requests
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          STALE_DAYS: ${{ inputs.stale_days }}
          KEEP_LABEL: ${{ inputs.keep_label }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          stale_seconds=$((STALE_DAYS * 86400))
          now=$(date -u +%s)
          closed=0
          skipped_keep=0
          skipped_fresh=0

          echo "Repository: ${REPO}"
          echo "Stale threshold: ${STALE_DAYS} days"
          echo "Keep label: ${KEEP_LABEL}"
          echo "Dry run: ${DRY_RUN}"

          prs_json=$(gh pr list --repo "${REPO}" --state open --json number,updatedAt,labels --limit 500)
          mapfile -t prs < <(jq -c '.[]' <<<"${prs_json}")

          if [[ ${#prs[@]} -eq 0 ]]; then
            echo "No open pull requests."
            exit 0
          fi

          for pr_json in "${prs[@]}"; do
            number=$(jq -r '.number' <<<"${pr_json}")
            updated_at=$(jq -r '.updatedAt' <<<"${pr_json}")

            if jq -e --arg label "${KEEP_LABEL}" '.labels[].name == $label' <<<"${pr_json}" >/dev/null; then
              echo "Skipping PR #${number} (label: ${KEEP_LABEL})"
              skipped_keep=$((skipped_keep + 1))
              continue
            fi

            updated_epoch=$(date -u -d "${updated_at}" +%s)
            age=$((now - updated_epoch))

            if (( age < stale_seconds )); then
              skipped_fresh=$((skipped_fresh + 1))
              continue
            fi

            age_days=$((age / 86400))
            comment=$'Closing as stale: no activity for '"${age_days}"$' days (threshold: '"${STALE_DAYS}"$' days). Add the `'"${KEEP_LABEL}"$'` label to exempt a pull request from automatic closure.'

            if [[ "${DRY_RUN}" == "true" ]]; then
              echo "[DRY RUN] Would close PR #${number} (last updated ${updated_at})"
            else
              gh pr close "${number}" --repo "${REPO}" --comment "${comment}" --delete-branch
              echo "Closed PR #${number}"
              closed=$((closed + 1))
            fi
          done

          echo "Summary: closed=${closed}, skipped_keep=${skipped_keep}, skipped_fresh=${skipped_fresh}"
      - name: Clean stale branches
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          STALE_DAYS: ${{ inputs.stale_days }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          stale_seconds=$((STALE_DAYS * 86400))
          now=$(date -u +%s)
          deleted=0
          skipped_default=0
          skipped_protected=0
          skipped_open_pr=0
          skipped_fresh=0

          echo "Repository: ${REPO}"
          echo "Branch stale threshold: ${STALE_DAYS} days"
          echo "Dry run: ${DRY_RUN}"

          default_branch=$(gh repo view "${REPO}" --json defaultBranchRef --jq '.defaultBranchRef.name')

          declare -A open_pr_branches=()
          while IFS= read -r branch_name; do
            [[ -n "${branch_name}" ]] || continue
            open_pr_branches["${branch_name}"]=1
          done < <(gh pr list --repo "${REPO}" --state open --json headRefName --limit 500 --jq '.[].headRefName')

          mapfile -t branches < <(gh api "repos/${REPO}/branches" --paginate --jq '.[] | @json')

          if [[ ${#branches[@]} -eq 0 ]]; then
            echo "No branches."
            exit 0
          fi

          for branch_json in "${branches[@]}"; do
            name=$(jq -r '.name' <<<"${branch_json}")
            protected=$(jq -r '.protected' <<<"${branch_json}")
            sha=$(jq -r '.commit.sha' <<<"${branch_json}")

            if [[ "${name}" == "${default_branch}" ]]; then
              echo "Skipping branch ${name} (default branch)"
              skipped_default=$((skipped_default + 1))
              continue
            fi

            if [[ "${protected}" == "true" ]]; then
              echo "Skipping branch ${name} (protected)"
              skipped_protected=$((skipped_protected + 1))
              continue
            fi

            if [[ -n "${open_pr_branches[${name}]+x}" ]]; then
              echo "Skipping branch ${name} (open pull request)"
              skipped_open_pr=$((skipped_open_pr + 1))
              continue
            fi

            commit_json=$(gh api "repos/${REPO}/commits/${sha}")
            committed_at=$(jq -r '.commit.committer.date // .commit.author.date' <<<"${commit_json}")
            committed_epoch=$(date -u -d "${committed_at}" +%s)
            age=$((now - committed_epoch))

            if (( age < stale_seconds )); then
              skipped_fresh=$((skipped_fresh + 1))
              continue
            fi

            age_days=$((age / 86400))

            if [[ "${DRY_RUN}" == "true" ]]; then
              echo "[DRY RUN] Would delete branch ${name} (last commit ${committed_at}, ${age_days} days old)"
            else
              gh api --method DELETE "repos/${REPO}/git/refs/heads/${name}"
              echo "Deleted branch ${name}"
              deleted=$((deleted + 1))
            fi
          done

          echo "Summary: deleted=${deleted}, skipped_default=${skipped_default}, skipped_protected=${skipped_protected}, skipped_open_pr=${skipped_open_pr}, skipped_fresh=${skipped_fresh}"
