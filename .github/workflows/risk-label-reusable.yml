name: Risk Label (reusable)

on:
  workflow_call:

jobs:
  risk-label:
    name: Apply risk label
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Detect risk level and apply label
        uses: actions/github-script@v9
        with:
          script: |
            const script = require('${{ github.action_path }}/../../../scripts/lib/risk-label.js')
            "./../../tests"
            await script({github, context, core})
