name: axxy-tests

on:
  workflow_call:
    inputs:
      base-url:
        description: 'The base URL for the axxy tests'
        type: string
        required: true
      admin-url:
        description: 'The admin URL for the axxy tests'
        type: string
        required: true
      email:
        description: 'Email address for the axxy tests gh pages commit'
        type: string
        required: false
        default: 'trade-tariff-infrastructure-continuity<hmrc-trade-tariff-support-g@digital.hmrc.gov.uk>'

    secrets:
      slack-webhook:
        description: 'Slack webhook URL for notifications'
        required: true
      ssh-key:
        description: 'SSH private key used for commits'
        required: true
      basic-password:
        description: 'The basic auth password'
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          cache: 'yarn'

      - run: yarn install

      - run: yarn playwright install --with-deps chromium

      - run: yarn run playwright test --workers 1
        env:
          ADMIN_URL: ${{ inputs.admin-url }}
          BASE_URL: ${{ inputs.base-url }}
          BASIC_PASSWORD: ${{ secrets.basic-password }}

      - run: cp node_modules/govuk-frontend/dist/govuk/assets/images/favicon.ico dist/favicon.ico

      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-ssh@main
        with:
          ssh-key: ${{ secrets.ssh-key }}

      - run: |
          yarn run gh-pages \
            --dist dist \
            --user "${{ inputs.email }}" \
            --silent \
            --nojekyll \
            --no-history

      - uses: trade-tariff/trade-tariff-tools/.github/actions/slack-notify@main
        with:
          webhook: ${{ secrets.slack-webhook }}
          channel: non-production-alerts
          username: Accessibility Report
          icon_emoji: ':playwright:'
          color: success
          title: New Accessibility report generated
          message: https://trade-tariff.github.io/trade-tariff-frontend/accessibility-report.html
