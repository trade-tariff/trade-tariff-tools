name: Slack Notify
description: Send a notification to a Slack channel

inputs:
  webhook:
    required: true
    description: Slack webhook URL
  channel:
    required: false
    default: 'deployments'
    description: Slack channel to post to
  username:
    required: false
    default: 'Deploy Bot'
    description: Bot username displayed in Slack
  icon_emoji:
    required: false
    default: ':robot_face:'
    description: Emoji icon for the bot
  color:
    required: false
    default: 'good'
    description: 'Attachment sidebar color. Accepts: good, danger, warning, success, failure, cancelled, or a hex code'
  title:
    required: false
    default: ''
    description: Message title
  message:
    required: true
    description: Message body (supports Slack mrkdwn formatting)

runs:
  using: composite
  steps:
    - shell: bash
      env:
        WEBHOOK: ${{ inputs.webhook }}
        CHANNEL: ${{ inputs.channel }}
        USERNAME: ${{ inputs.username }}
        ICON_EMOJI: ${{ inputs.icon_emoji }}
        COLOR: ${{ inputs.color }}
        TITLE: ${{ inputs.title }}
        MESSAGE: ${{ inputs.message }}
      run: |
        case "$COLOR" in
          success) COLOR="good" ;;
          failure) COLOR="danger" ;;
          cancelled) COLOR="#808080" ;;
        esac

        FOOTER="${GITHUB_REPOSITORY} | <${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|View workflow run>"

        PAYLOAD=$(jq -n \
          --arg channel "$CHANNEL" \
          --arg username "$USERNAME" \
          --arg icon_emoji "$ICON_EMOJI" \
          --arg color "$COLOR" \
          --arg title "$TITLE" \
          --arg text "$MESSAGE" \
          --arg footer "$FOOTER" \
          --arg author_name "$GITHUB_ACTOR" \
          --arg author_link "${GITHUB_SERVER_URL}/${GITHUB_ACTOR}" \
          --arg author_icon "${GITHUB_SERVER_URL}/${GITHUB_ACTOR}.png?size=32" \
          --arg fallback "$TITLE: $MESSAGE" \
          '{
            channel: $channel,
            username: $username,
            icon_emoji: $icon_emoji,
            attachments: [{
              color: $color,
              author_name: $author_name,
              author_link: $author_link,
              author_icon: $author_icon,
              title: $title,
              text: $text,
              footer: $footer,
              fallback: $fallback
            }]
          }')

        RESPONSE=$(curl -sS -X POST \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "$WEBHOOK")

        if [[ "$RESPONSE" != "ok" ]]; then
          echo "::warning::Slack notification failed: $RESPONSE"
        fi
