name: 'Run database migrations'
description: 'Applies schema changes pre-deployment.'

inputs:
  role-to-assume:
    description: 'The IAM role ARN to assume for AWS operations.'
    required: true
  region:
    required: false
    default: 'eu-west-2'
  overrides:
    description: 'Container overrides for running the task in JSON format.'
    required: true
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v6

    - uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ steps.config.outputs.role_to_assume }}
        aws-region: ${{ inputs.region }}

    - name: Apply database migration
      shell: bash
      run: |
        echo "::notice::Running migration task for ${ENVIRONMENT}..."
        ./bin/db-migrate ${{ inputs.environment }} ${{ inputs.overrides }}
